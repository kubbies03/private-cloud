# dnsmasq — Internal DNS for lab.local
# Deploy on Ubuntu Infra VM (192.168.159.131)

# Interface binding
# IMPORTANT: Change ens33 to match your VM's interface name
# Check with: ip link show | grep -E "^[0-9]+:" | awk '{print $2}'
# Common names: ens33 (VMware), eth0, enp0s3 (VirtualBox)
interface=lo
interface=ens33
bind-interfaces

# Domain
domain=lab.local
local=/lab.local/

# Upstream DNS
server=8.8.8.8
server=1.1.1.1

# Cache
cache-size=1000
neg-ttl=60

# ─── A Records (lab.local) ───────────────────────────────────
address=/api.lab.local/192.168.159.131
address=/grafana.lab.local/192.168.159.131
address=/prometheus.lab.local/192.168.159.131
address=/infra.lab.local/192.168.159.131

# Wildcard: all *.lab.local → infra server
address=/.lab.local/192.168.159.131

# PTR reverse DNS
ptr-record=131.159.168.192.in-addr.arpa,infra.lab.local

# Log queries (useful for demo)
log-queries
log-facility=/var/log/dnsmasq.log
