server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ─── Docker container logs ───────────────────────────────
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            log:    log
            stream: stream
            time:   time
      - labels:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: log

  # ─── Syslog ──────────────────────────────────────────────
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: ubuntu-infra
          __path__: /var/log/syslog

  # ─── Auth log (SSH brute-force visibility) ────────────────
  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: ubuntu-infra
          __path__: /var/log/auth.log
    pipeline_stages:
      - regex:
          expression: '^.*sshd\[\d+\]: (?P<auth_result>Failed|Accepted) (?P<auth_method>\S+) for (?:invalid user )?(?P<username>\S+) from (?P<src_ip>\d+\.\d+\.\d+\.\d+)'
      - labels:
          auth_result:
          auth_method:
          src_ip:

  # ─── Nginx access logs ───────────────────────────────────
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          host: ubuntu-infra
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) \S+" (?P<status>\d+) (?P<bytes>\d+)'
      - labels:
          method:
          status:
